{% extends "base.html" %}
{% block content %}
  <section class="panel">
    <h1>{{ playlist.name }}</h1>
    {% if playlist_owner %}
      <p class="muted">Owner: {{ playlist_owner }}</p>
    {% endif %}
  </section>

  <section class="panel">
    {% if items or has_more %}
      <ul class="list">
        {% include "_playlist_items.html" %}
      </ul>
      {% if has_more %}
        <button class="load-more-btn"
                data-load-more
                data-url="{{ url_for('api_playlist_items', playlist_id=playlist._id) }}"
                data-offset="{{ next_offset }}"
                data-total="{{ total }}">
          Show {{ total - next_offset }} more
        </button>
      {% endif %}
    {% else %}
      <p class="muted">This playlist is empty.</p>
    {% endif %}
  </section>
{% endblock %}
